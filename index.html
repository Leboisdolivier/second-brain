<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0e0e0f">
<title>Second Brain</title>
<link rel="manifest" href="manifest.json">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:  #0e0e0f;
    --bg2: #161618;
    --bg3: #1e1e21;
    --border:  rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text:  #f0ede8;
    --text2: #9c9890;
    --text3: #5c5a57;
    --accent:  #e8c97a;
    --accent2: #c4a558;
    --accent-bg: rgba(232,201,122,0.08);
    --danger:  #e06060;
    --success: #6abf8a;
    --radius: 10px;
    --font-head: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
    --nav-h: 56px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
    overscroll-behavior: none;
  }

  .app {
    max-width: 680px;
    margin: 0 auto;
    padding: 20px 16px calc(var(--nav-h) + var(--safe-bottom) + 16px);
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 0.5px solid var(--border);
  }

  .logo {
    width: 34px; height: 34px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo svg { width: 17px; height: 17px; }

  header h1 {
    font-family: var(--font-head);
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.3px;
    flex: 1;
  }

  .api-mini {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .api-mini input {
    width: 110px;
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: 6px;
    padding: 5px 8px;
    color: var(--text2);
    font-family: var(--font-mono);
    font-size: 11px;
    outline: none;
  }
  .api-mini input:focus { border-color: var(--accent); }
  .btn-icon-sm {
    width: 28px; height: 28px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    border: 0.5px solid var(--border);
    background: transparent;
    color: var(--text3);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-icon-sm:hover { border-color: var(--accent); color: var(--accent); }

  /* ── BOTTOM TAB NAV ── */
  .tab-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: calc(var(--nav-h) + var(--safe-bottom));
    padding-bottom: var(--safe-bottom);
    background: var(--bg2);
    border-top: 0.5px solid var(--border);
    display: flex;
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: none;
    z-index: 50;
    -webkit-overflow-scrolling: touch;
  }
  .tab-nav::-webkit-scrollbar { display: none; }

  .tab-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    padding: 6px 14px;
    min-width: 60px;
    flex-shrink: 0;
    border: none;
    background: transparent;
    cursor: pointer;
    color: var(--text3);
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.3px;
    transition: color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .tab-btn .tab-icon { font-size: 18px; line-height: 1; }
  .tab-btn.active { color: var(--accent); }
  .tab-btn.active .tab-icon { filter: drop-shadow(0 0 6px rgba(232,201,122,0.5)); }

  /* ── PANELS ── */
  .panel { display: none; }
  .panel.active { display: block; }

  /* ── UPLOAD ZONE ── */
  .upload-zone {
    background: var(--bg2);
    border: 1.5px dashed var(--border2);
    border-radius: var(--radius);
    padding: 28px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    margin-bottom: 14px;
    position: relative;
    overflow: hidden;
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    background: var(--accent-bg);
  }
  .upload-zone input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .upload-icon {
    width: 42px; height: 42px;
    background: var(--bg3);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 10px;
  }
  .upload-icon svg { width: 20px; height: 20px; color: var(--accent); }
  .upload-zone p  { font-size: 13px; color: var(--text2); margin-bottom: 3px; }
  .upload-zone small { font-size: 11px; color: var(--text3); }

  /* ── PREVIEW CARD ── */
  .preview-card {
    background: var(--bg2);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 14px;
    display: none;
  }
  .preview-card.visible { display: block; }
  .preview-img {
    width: 100%; max-height: 180px; object-fit: cover;
    border-radius: 6px; margin-bottom: 10px;
  }
  .queue-badge {
    font-size: 11px; color: var(--text3); text-align: center;
    padding: 0 0 6px; font-family: var(--font-mono);
  }

  /* ── ANALYSIS RESULT ── */
  .analysis-result {
    background: var(--bg3);
    border: 0.5px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    margin-bottom: 10px;
    display: none;
  }
  .analysis-result.visible { display: block; }

  .detected-cat {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    font-family: var(--font-head);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--accent);
    background: var(--accent-bg);
    border: 0.5px solid rgba(232,201,122,0.2);
    border-radius: 4px;
    padding: 3px 8px;
    margin-bottom: 8px;
  }

  .scan-items { display: flex; flex-direction: column; gap: 5px; margin-bottom: 6px; }
  .scan-item {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 7px 9px; background: var(--bg2);
    border-radius: 5px; cursor: pointer;
  }
  .scan-item input[type=checkbox] {
    accent-color: var(--accent); flex-shrink: 0;
    width: 15px; height: 15px; margin-top: 2px;
  }
  .scan-item-title { font-size: 13px; font-weight: 600; }
  .scan-item-sub   { font-size: 11px; color: var(--accent); }
  .scan-item-note  { font-size: 10px; color: var(--text3); font-style: italic; }

  .result-note { font-size: 11px; color: var(--text3); font-style: italic; margin-top: 4px; }

  /* ── BUTTONS ── */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 16px; border-radius: 7px;
    font-family: var(--font-mono); font-size: 12px; font-weight: 500;
    cursor: pointer; border: none;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary {
    background: var(--accent); color: #1a1500;
    width: 100%; justify-content: center; font-size: 13px; padding: 11px;
  }
  .btn-primary:hover:not(:disabled) { background: var(--accent2); }
  .btn-ghost {
    background: var(--bg3); color: var(--text2);
    border: 0.5px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--border2); color: var(--text); }
  .btn-success {
    background: rgba(106,191,138,0.12); color: var(--success);
    border: 0.5px solid rgba(106,191,138,0.25);
  }

  .actions-row { display: flex; gap: 8px; margin-top: 10px; }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(26,21,0,0.3);
    border-top-color: #1a1500;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── STATS (music) ── */
  .stats {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 8px; margin-bottom: 16px;
  }
  .stat {
    background: var(--bg2); border: 0.5px solid var(--border);
    border-radius: var(--radius); padding: 11px 13px;
  }
  .stat-val {
    font-family: var(--font-head); font-size: 22px;
    font-weight: 700; color: var(--accent); line-height: 1; margin-bottom: 3px;
  }
  .stat-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; }

  /* ── FILTER ROW ── */
  .filter-row { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
  .filter-btn {
    padding: 5px 12px; border-radius: 20px;
    font-family: var(--font-mono); font-size: 11px;
    cursor: pointer; border: 0.5px solid var(--border);
    background: transparent; color: var(--text3);
    transition: all 0.15s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--accent-bg); border-color: var(--accent); color: var(--accent);
  }

  /* ── ITEM LIST ── */
  .item-list { display: flex; flex-direction: column; gap: 6px; }

  .item-row {
    background: var(--bg2); border: 0.5px solid var(--border);
    border-radius: var(--radius); padding: 11px 13px;
    display: flex; align-items: center; gap: 10px;
    transition: border-color 0.15s;
    animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; } }

  .item-row:hover { border-color: var(--border2); }
  .item-row.done-item { opacity: 0.5; border-style: dashed; }
  .item-row.done-item .item-title { text-decoration: line-through; color: var(--text3); }

  .item-num { font-size: 11px; color: var(--text3); min-width: 18px; text-align: right; font-weight: 300; }
  .item-info { flex: 1; min-width: 0; }
  .item-title {
    font-family: var(--font-head); font-size: 14px; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .item-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .item-date { font-size: 10px; color: var(--text3); white-space: nowrap; font-weight: 300; }
  .item-actions { display: flex; gap: 4px; }

  .icon-btn {
    width: 28px; height: 28px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; border: 0.5px solid var(--border);
    background: transparent; color: var(--text3);
    transition: all 0.15s; flex-shrink: 0;
  }
  .icon-btn:hover { border-color: var(--border2); color: var(--text); }
  .icon-btn.done  { color: var(--success); border-color: rgba(106,191,138,0.3); background: rgba(106,191,138,0.08); }
  .icon-btn.del:hover { color: var(--danger); border-color: rgba(224,96,96,0.3); background: rgba(224,96,96,0.08); }
  .icon-btn.edit-btn { }

  /* ── EDIT INLINE ── */
  .edit-input {
    background: var(--bg3); border: 0.5px solid var(--accent);
    border-radius: 4px; color: var(--text); padding: 2px 6px;
    font-family: inherit; font-size: inherit; width: 100%; outline: none;
  }
  .edit-input-sub { font-size: 11px; margin-top: 2px; }

  /* ── TAG ── */
  .tag {
    display: inline-flex; align-items: center;
    padding: 2px 7px; border-radius: 4px; font-size: 10px;
    background: var(--accent-bg); color: var(--accent2);
    border: 0.5px solid rgba(232,201,122,0.2); margin-left: 5px;
  }

  /* ── MANUAL ADD ── */
  .manual-add {
    background: var(--bg2); border: 0.5px solid var(--border);
    border-radius: var(--radius); padding: 12px 14px; margin-top: 14px;
  }
  .manual-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .manual-row input {
    flex: 1; min-width: 100px;
    background: var(--bg3); border: 0.5px solid var(--border);
    border-radius: 6px; padding: 7px 9px; color: var(--text);
    font-family: var(--font-mono); font-size: 12px; outline: none;
  }
  .manual-row input:focus { border-color: var(--accent); }
  .manual-row input::placeholder { color: var(--text3); }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center; padding: 40px 20px;
    color: var(--text3); font-size: 12px;
  }
  .empty-state .empty-icon { font-size: 32px; margin-bottom: 10px; }

  /* ── TOAST ── */
  .toast {
    position: fixed; top: 16px; left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--bg3); border: 0.5px solid var(--border2);
    border-radius: 8px; padding: 9px 16px;
    font-size: 13px; color: var(--text);
    transition: transform 0.25s ease; z-index: 999; white-space: nowrap;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: rgba(106,191,138,0.4); color: var(--success); }
  .toast.error   { border-color: rgba(224,96,96,0.4);   color: var(--danger); }

  /* ── LOADING ── */
  .loading-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(14,14,15,0.85);
    z-index: 200; align-items: center; justify-content: center;
    flex-direction: column; gap: 14px;
  }
  .loading-overlay.visible { display: flex; }
  .loading-ring {
    width: 46px; height: 46px;
    border: 3px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  .loading-text { font-size: 13px; color: var(--text2); }

  /* ── CATEGORY SELECTOR ── */
  .cat-selector {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 8px; flex-wrap: wrap;
  }
  .cat-selector-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; }
  .cat-select {
    background: var(--bg2); border: 0.5px solid var(--accent);
    border-radius: 6px; color: var(--accent); font-family: var(--font-mono);
    font-size: 12px; padding: 4px 8px; cursor: pointer; outline: none;
    flex: 1;
  }
  .cat-select option { background: var(--bg3); color: var(--text); }

  /* ── NOTES ── */
  .note-card {
    background: var(--bg2); border: 0.5px solid var(--border);
    border-radius: var(--radius); padding: 12px 14px;
    transition: border-color 0.15s; animation: fadeIn 0.25s ease;
    cursor: pointer;
  }
  .note-card:hover { border-color: var(--border2); }
  .note-card.archived { opacity: 0.5; border-style: dashed; }
  .note-card-header { display: flex; align-items: flex-start; gap: 8px; }
  .note-card-title {
    font-family: var(--font-head); font-size: 14px; font-weight: 500;
    flex: 1; min-width: 0;
  }
  .note-date { font-size: 10px; color: var(--text3); white-space: nowrap; font-weight: 300; }
  .note-actions { display: flex; gap: 4px; }
  .note-content {
    font-size: 12px; color: var(--text2); margin-top: 8px;
    white-space: pre-wrap; line-height: 1.6;
    display: none; border-top: 0.5px solid var(--border); padding-top: 8px;
  }
  .note-content.expanded { display: block; }
  .note-preview { font-size: 11px; color: var(--text3); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .note-new-form {
    background: var(--bg2); border: 0.5px solid var(--border);
    border-radius: var(--radius); padding: 12px 14px; margin-bottom: 14px; display: none;
  }
  .note-new-form.visible { display: block; }
  .note-new-form input, .note-new-form textarea {
    width: 100%; background: var(--bg3); border: 0.5px solid var(--border);
    border-radius: 6px; padding: 8px 10px; color: var(--text);
    font-family: var(--font-mono); font-size: 13px; outline: none; resize: vertical;
  }
  .note-new-form input:focus, .note-new-form textarea:focus { border-color: var(--accent); }
  .note-new-form input::placeholder, .note-new-form textarea::placeholder { color: var(--text3); }
  .note-new-form textarea { min-height: 100px; margin-top: 6px; }
  .note-new-form .note-form-actions { display: flex; gap: 6px; margin-top: 8px; }

  /* ── KEEP IMAGE TOGGLE ── */
  #btnKeepImg { font-size: 16px; padding: 9px 11px; transition: all 0.15s; }
  #btnKeepImg.active {
    background: var(--accent-bg);
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 8px rgba(232,201,122,0.2);
  }

  /* ── IMAGE THUMB BUTTON ── */
  .img-thumb-btn {
    width: 28px; height: 28px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    border: 0.5px solid var(--border); background: transparent;
    color: var(--text3); cursor: pointer; font-size: 13px;
    transition: all 0.15s; flex-shrink: 0;
  }
  .img-thumb-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── IMAGE MODAL ── */
  .img-modal {
    display: none; position: fixed; inset: 0; z-index: 300;
    align-items: center; justify-content: center;
  }
  .img-modal.open { display: flex; }
  .img-modal-bg {
    position: absolute; inset: 0;
    background: rgba(14,14,15,0.92);
  }
  .img-modal-inner {
    position: relative; z-index: 1;
    max-width: min(92vw, 600px); width: 100%;
    background: var(--bg2); border: 0.5px solid var(--border2);
    border-radius: var(--radius); padding: 16px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .img-modal-img {
    width: 100%; border-radius: 6px;
    max-height: 70vh; object-fit: contain;
  }
  .img-modal-actions { display: flex; gap: 8px; }

  /* ── SECTION TITLE ── */
  .section-title {
    font-family: var(--font-head); font-size: 12px; font-weight: 600;
    color: var(--text3); text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
  }
  .section-title::after { content: ''; flex: 1; height: 0.5px; background: var(--border); }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-ring"></div>
  <div class="loading-text" id="loadingText">Analyse en cours…</div>
</div>

<div class="toast" id="toast"></div>

<div class="app">

  <header>
    <div class="logo">
      <img src="icon.png" alt="Second Brain" style="width:100%;height:100%;object-fit:cover;border-radius:8px;" />
    </div>
    <h1>Second Brain</h1>
    <div class="api-mini">
      <input type="password" id="apiKey" placeholder="sk-ant-…" title="Clé API Anthropic" />
      <button class="btn-icon-sm" id="btnSaveKey" title="Sauvegarder la clé">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
          <polyline points="17 21 17 13 7 13 7 21"/>
          <polyline points="7 3 7 8 15 8"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- SCAN PANEL -->
  <div class="panel active" id="panel-scan">
    <div class="upload-zone" id="uploadZone">
      <input type="file" id="fileInput" accept="image/*" multiple />
      <div class="upload-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
      </div>
      <p>Dépose tes screenshots ici</p>
      <small>ou clique pour choisir une ou plusieurs images</small>
    </div>

    <div class="preview-card" id="previewCard">
      <div class="queue-badge" id="queueBadge" style="display:none"></div>
      <img id="previewImg" class="preview-img" />
      <div class="analysis-result" id="analysisResult">
        <div class="cat-selector" id="catSelector" style="display:none">
          <span class="cat-selector-label">Vers</span>
          <select class="cat-select" id="catSelect"></select>
        </div>
        <div id="scanItemsContainer"></div>
        <div class="result-note" id="resultNote"></div>
      </div>
      <button class="btn btn-primary" id="btnAnalyze">
        <div class="spinner" id="spinner"></div>
        <span id="btnAnalyzeText">Analyser avec Claude Vision</span>
      </button>
      <div class="actions-row" id="actionsRow" style="display:none">
        <button class="btn btn-success" id="btnSave" style="flex:1">Ajouter</button>
        <button class="btn btn-ghost" id="btnKeepImg" title="Conserver la capture avec l'élément">📷</button>
        <button class="btn btn-ghost" id="btnCancel">Annuler</button>
      </div>
    </div>
  </div>

  <!-- MUSIC PANEL -->
  <div class="panel" id="panel-music">
    <div class="stats">
      <div class="stat">
        <div class="stat-val" id="statTotal">0</div>

        <button class="btn btn-ghost" data-add="music" style="white-space:nowrap;padding:7px 12px;font-size:12px">+ Ajouter</button>

  <!-- NOTES PANEL -->
  <div class="panel" id="panel-notes">

        Aucune note pour l'instant.

  <div id="genericPanels"></div>

<!-- BOTTOM TAB NAV (injected by JS) -->
<nav class="tab-nav" id="tabNav"></nav>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, orderBy, setDoc, getDoc, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ── CONFIG ──────────────────────────────────────────────────────────
  const firebaseConfig = {
    apiKey: "AIzaSyAGQhsIG0EaLZffLe2FvxQJWWjVJypkywE",
    authDomain: "second-brain-91664.firebaseapp.com",
    projectId: "second-brain-91664",
    storageBucket: "second-brain-91664.firebasestorage.app",
    messagingSenderId: "910954096501",
    appId: "1:910954096501:web:d30d7b47a0c1bb56bf953c"
  };

  const TABS = [
    { id: "scan",      label: "Scan",      icon: "📷" },
    { id: "music",     label: "Musique",   icon: "🎵", col: "music_downloads", doneLabel: "Téléchargé", subHint: "Artiste", claudeCat: "music" },
    { id: "watchlist", label: "Films",     icon: "🎬", col: "brain_items",     doneLabel: "Vu",         subHint: "Plateforme", claudeCat: "watchlist" },
    { id: "series",    label: "Séries",    icon: "📺", col: "brain_items",     doneLabel: "Vu",         subHint: "Plateforme", claudeCat: "series" },
    { id: "recette",   label: "Recettes",  icon: "🍳", col: "brain_items",     doneLabel: "Essayée",    subHint: "Source", claudeCat: "recette" },
    { id: "bricolage", label: "Bricolage", icon: "🔨", col: "brain_items",     doneLabel: "Fait",       subHint: "Type", claudeCat: "bricolage" },
    { id: "resine",    label: "Résine",    icon: "🫧", col: "brain_items",     doneLabel: "Fait",       subHint: "Technique", claudeCat: "resine" },
    { id: "deco",      label: "Déco",      icon: "🏡", col: "brain_items",     doneLabel: "Acheté",     subHint: "Style", claudeCat: "deco" },
    { id: "ia",        label: "IA",        icon: "🤖", col: "brain_items",     doneLabel: "Testé",      subHint: "Outil / lien", claudeCat: "ia" },
    { id: "concert",   label: "Concerts",  icon: "🎤", col: "brain_items",     doneLabel: "Vu",         subHint: "Lieu / date", claudeCat: "concert" },
    { id: "instagram", label: "Instagram", icon: "📸", col: "brain_items",     doneLabel: "Sauvegardé", subHint: "@compte", claudeCat: "instagram" },
    { id: "activite",  label: "Activités", icon: "🏃", col: "brain_items",     doneLabel: "Fait",       subHint: "Lieu", claudeCat: "activite" },
    { id: "cadeaux",   label: "Cadeaux",   icon: "🎁", col: "brain_items",     doneLabel: "Offert",     subHint: "Pour qui", claudeCat: "cadeaux" },
    { id: "travail",   label: "Travail",   icon: "💼", col: "brain_items",     doneLabel: "Fait",       subHint: "Projet", claudeCat: "travail" },
    { id: "blagues",   label: "Blagues",   icon: "😂", col: "brain_items",     doneLabel: "Partagée",   subHint: "Contexte", claudeCat: "blagues" },
    { id: "pensees",   label: "Pensées",   icon: "💭", col: "brain_items",     doneLabel: "Notée",      subHint: "Thème", claudeCat: "pensees" },
    { id: "notes",     label: "Notes",     icon: "📝", col: "brain_items",     doneLabel: "Archivé",    subHint: "Contenu", claudeCat: "notes", isNotes: true },
  ];

  const GENERIC_TABS = TABS.filter(t => t.id !== "scan" && t.id !== "music" && !t.isNotes);

  // ── FIREBASE ────────────────────────────────────────────────────────
  const fbApp = initializeApp(firebaseConfig);
  const db    = getFirestore(fbApp);

  // ── STATE ───────────────────────────────────────────────────────────
  let musicItems      = [];
  let musicFilter     = "all";
  const genericData   = {}; // { tabId: { items: [], loaded: false, filter: "all" } }
  let pendingScan     = null; // { category, items: [{title,subtitle,note}] }
  let currentImgB64   = null;
  let currentImgType  = "image/jpeg";
  let imageQueue      = [];
  let queueIndex      = 0;
  let activeTabId     = "scan";
  let keepImage       = false;
  let modalItemRef    = null; // { id, col, tabId }
  let notesItems      = [];
  let notesLoaded     = false;

  const $ = id => document.getElementById(id);

  // ── UTILS ───────────────────────────────────────────────────────────
  function showToast(msg, type = "") {
    const t = $("toast");
    t.textContent = msg;
    t.className = "toast show " + type;
    setTimeout(() => t.className = "toast", 2000);
  }

  function setLoading(on, text = "Analyse en cours…") {
    $("loadingOverlay").classList.toggle("visible", on);
    $("loadingText").textContent = text;
  }

  function formatDate(ts) {
    if (!ts) return "";
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString("fr-FR", { day: "2-digit", month: "2-digit" });
  }

  function tabConfig(id) { return TABS.find(t => t.id === id); }

  function resizeImage(b64, type, maxW = 800) {
    return new Promise(resolve => {
      const img = new Image();
      img.onload = () => {
        const scale  = Math.min(1, maxW / img.width);
        const canvas = document.createElement("canvas");
        canvas.width  = Math.round(img.width  * scale);
        canvas.height = Math.round(img.height * scale);
        canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL("image/jpeg", 0.7).split(",")[1]);
      };
      img.src = `data:${type};base64,${b64}`;
    });
  }

  function esc(str) { return (str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;"); }

  // ── TAB NAV INIT ────────────────────────────────────────────────────
  function buildNav() {
    const nav = $("tabNav");
    nav.innerHTML = TABS.map(t => `
      <button class="tab-btn${t.id === "scan" ? " active" : ""}" data-tab="${t.id}">
        <span class="tab-icon">${t.icon}</span>
        <span>${t.label}</span>
      </button>`).join("");
    nav.querySelectorAll(".tab-btn").forEach(btn => {
      btn.addEventListener("click", () => switchTab(btn.dataset.tab));
    });
    // scroll active into view
    nav.querySelector(".tab-btn.active")?.scrollIntoView({ inline: "center", behavior: "smooth" });
  }

  function buildGenericPanels() {
    const host = $("genericPanels");
    host.innerHTML = GENERIC_TABS.map(t => `
      <div class="panel" id="panel-${t.id}">
        <div class="filter-row">
          <button class="filter-btn active" data-tab="${t.id}" data-filter="all">Tout</button>
          <button class="filter-btn" data-tab="${t.id}" data-filter="pending">À faire</button>
          <button class="filter-btn" data-tab="${t.id}" data-filter="done">${esc(t.doneLabel)}</button>
        </div>
        <div class="item-list" id="list-${t.id}">
          <div class="empty-state" id="empty-${t.id}">
            <div class="empty-icon">${t.icon}</div>
            Rien ici pour l'instant.
          </div>
        </div>
        <div class="manual-add">
          <div class="manual-row">
            <input type="text" id="manual-title-${t.id}" placeholder="Titre / description" />
            <input type="text" id="manual-sub-${t.id}" placeholder="${esc(t.subHint)}" style="max-width:150px" />
            <button class="btn btn-ghost" data-add="${t.id}" style="white-space:nowrap;padding:7px 12px;font-size:12px">+ Ajouter</button>
          </div>
        </div>
      </div>`).join("");

    // filter buttons
    host.querySelectorAll(".filter-btn[data-tab]").forEach(btn => {
      btn.addEventListener("click", () => {
        const tid = btn.dataset.tab;
        host.querySelectorAll(`.filter-btn[data-tab="${tid}"]`).forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        if (!genericData[tid]) genericData[tid] = { items: [], loaded: false, filter: "all" };
        genericData[tid].filter = btn.dataset.filter;
        renderGeneric(tid);
      });
    });

    // add buttons
    host.querySelectorAll("[data-add]").forEach(btn => {
      btn.addEventListener("click", () => handleManualAdd(btn.dataset.add));
    });
    host.querySelectorAll(".manual-row input").forEach(inp => {
      inp.addEventListener("keydown", e => {
        if (e.key === "Enter") inp.closest(".manual-add").querySelector("[data-add]").click();
      });
    });
  }

  function switchTab(tabId) {
    activeTabId = tabId;
    // panels
    document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
    $(`panel-${tabId}`)?.classList.add("active");
    // nav btns
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(`.tab-btn[data-tab="${tabId}"]`).forEach(b => {
      b.classList.add("active");
      b.scrollIntoView({ inline: "center", behavior: "smooth" });
    });
    // lazy load
    if (tabId === "music" && musicItems.length === 0) loadMusic();
    else if (tabId === "notes" && !notesLoaded) loadNotes();
    else if (tabId !== "scan" && tabId !== "music") {
      if (!genericData[tabId]?.loaded) loadGeneric(tabId);
    }
  }

  // ── MUSIC CRUD ──────────────────────────────────────────────────────
  async function loadMusic() {
    try {
      const q = query(collection(db, "music_downloads"), orderBy("createdAt", "desc"));
      const snap = await getDocs(q);
      musicItems = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      updateMusicStats();
      renderMusic();
    } catch (e) { showToast("Erreur Firebase : " + e.message, "error"); }
  }

  function updateMusicStats() {
    const done = musicItems.filter(t => t.downloaded).length;
    $("statTotal").textContent   = musicItems.length;
    $("statPending").textContent = musicItems.length - done;
    $("statDone").textContent    = done;
  }

  function renderMusic() {
    const list  = $("list-music");
    const empty = $("empty-music");
    const filtered = musicItems.filter(t => {
      if (musicFilter === "pending") return !t.downloaded;
      if (musicFilter === "done")    return  t.downloaded;
      return true;
    });
    list.querySelectorAll(".item-row").forEach(el => el.remove());
    empty.style.display = filtered.length === 0 ? "block" : "none";
    filtered.forEach((item, i) => {
      const el = document.createElement("div");
      el.className = "item-row" + (item.downloaded ? " done-item" : "");
      el.dataset.id  = item.id;
      el.dataset.col = "music_downloads";
      el.innerHTML = `
        <div class="item-num">${i + 1}</div>
        <div class="item-info">
          <div class="item-title"><span class="item-title-text">${esc(item.title)}</span>${item.source === "vision" ? '<span class="tag">IA</span>' : ""}</div>
          <div class="item-sub">${esc(item.artist || "—")}</div>
        </div>
        <div class="item-date">${formatDate(item.createdAt)}</div>
        <div class="item-actions">
          <button class="icon-btn edit-btn" title="Modifier" onclick="editItem('${item.id}','music_downloads')">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          ${item.imageThumb ? `<button class="img-thumb-btn" title="Voir la capture" onclick="viewImage('${item.id}','music_downloads','music')">📷</button>` : ""}
          <button class="icon-btn ${item.downloaded ? "done" : ""}" title="${item.downloaded ? "Remettre" : "Marquer téléchargé"}" onclick="toggleMusicDone('${item.id}')">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
          </button>
          <button class="icon-btn del" title="Supprimer" onclick="deleteItem('${item.id}','music_downloads','music')">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>`;
      list.appendChild(el);
    });
  }

  async function addMusic(title, artist, source = "manual", imageThumb = null) {
    const data = { title, artist: artist || "", downloaded: false, createdAt: new Date(), source, ...(imageThumb ? { imageThumb } : {}) };
    try {
      const ref = await addDoc(collection(db, "music_downloads"), data);
      musicItems.unshift({ id: ref.id, ...data });
      updateMusicStats();
      renderMusic();
      showToast("Ajouté : " + title, "success");
    } catch (e) { showToast("Erreur Firebase : " + e.message, "error"); }
  }

  window.toggleMusicDone = async (id) => {
    const item = musicItems.find(t => t.id === id);
    if (!item) return;
    try {
      await updateDoc(doc(db, "music_downloads", id), { downloaded: !item.downloaded });
      item.downloaded = !item.downloaded;
      updateMusicStats();
      renderMusic();
    } catch (e) { showToast("Erreur : " + e.message, "error"); }
  };

  // ── GENERIC CRUD ────────────────────────────────────────────────────
  async function loadGeneric(tabId) {
    if (!genericData[tabId]) genericData[tabId] = { items: [], loaded: false, filter: "all" };
    const cfg = tabConfig(tabId);
    try {
      const q = query(
        collection(db, "brain_items"),
        where("category", "==", cfg.claudeCat)
      );
      const snap = await getDocs(q);
      genericData[tabId].items = snap.docs
        .map(d => ({ id: d.id, ...d.data() }))
        .sort((a, b) => {
          const ta = a.createdAt?.toDate?.() || new Date(a.createdAt || 0);
          const tb = b.createdAt?.toDate?.() || new Date(b.createdAt || 0);
          return tb - ta;
        });
      genericData[tabId].loaded = true;
      renderGeneric(tabId);
    } catch (e) { showToast("Erreur Firebase : " + e.message, "error"); }
  }

  function renderGeneric(tabId) {
    const data  = genericData[tabId];
    const cfg   = tabConfig(tabId);
    const list  = $(`list-${tabId}`);
    const empty = $(`empty-${tabId}`);
    if (!data) return;
    const filter = data.filter || "all";
    const filtered = data.items.filter(item => {
      if (filter === "pending") return !item.done;
      if (filter === "done")    return  item.done;
      return true;
    });
    list.querySelectorAll(".item-row").forEach(el => el.remove());
    empty.style.display = filtered.length === 0 ? "block" : "none";
    filtered.forEach((item, i) => {
      const el = document.createElement("div");
      el.className = "item-row" + (item.done ? " done-item" : "");
      el.dataset.id = item.id;
      el.innerHTML = `
        <div class="item-num">${i + 1}</div>
        <div class="item-info">
          <div class="item-title"><span class="item-title-text">${esc(item.title)}</span>${item.source === "vision" ? '<span class="tag">IA</span>' : ""}</div>
          <div class="item-sub">${esc(item.subtitle || "")}</div>
        </div>
        <div class="item-date">${formatDate(item.createdAt)}</div>
        <div class="item-actions">
          <button class="icon-btn edit-btn" title="Modifier" onclick="editItem('${item.id}','brain_items','${tabId}')">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          ${item.imageThumb ? `<button class="img-thumb-btn" title="Voir la capture" onclick="viewImage('${item.id}','brain_items','${tabId}')">📷</button>` : ""}
          <button class="icon-btn ${item.done ? "done" : ""}" title="${item.done ? "Remettre" : esc(cfg.doneLabel)}" onclick="toggleGenericDone('${item.id}','${tabId}')">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
          </button>
          <button class="icon-btn del" title="Supprimer" onclick="deleteItem('${item.id}','brain_items','${tabId}')">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>`;
      list.appendChild(el);
    });
  }

  async function addGeneric(tabId, title, subtitle, note, source = "manual", imageThumb = null) {
    const cfg  = tabConfig(tabId);
    const data = { category: cfg.claudeCat, title, subtitle: subtitle || "", note: note || "", done: false, createdAt: new Date(), source, ...(imageThumb ? { imageThumb } : {}) };
    try {
      const ref = await addDoc(collection(db, "brain_items"), data);
      if (!genericData[tabId]) genericData[tabId] = { items: [], loaded: true, filter: "all" };
      genericData[tabId].items.unshift({ id: ref.id, ...data });
      genericData[tabId].loaded = true;
      renderGeneric(tabId);
      showToast("Ajouté : " + title, "success");
    } catch (e) { showToast("Erreur Firebase : " + e.message, "error"); }
  }

  window.toggleGenericDone = async (id, tabId) => {
    const item = genericData[tabId]?.items.find(t => t.id === id);
    if (!item) return;
    try {
      await updateDoc(doc(db, "brain_items", id), { done: !item.done });
      item.done = !item.done;
      renderGeneric(tabId);
    } catch (e) { showToast("Erreur : " + e.message, "error"); }
  };

  // ── SHARED EDIT / DELETE ────────────────────────────────────────────
  window.editItem = (id, col, tabId) => {
    const el = document.querySelector(`.item-row[data-id="${id}"]`);
    if (!el) return;
    let item;
    if (col === "music_downloads") item = musicItems.find(t => t.id === id);
    else item = genericData[tabId]?.items.find(t => t.id === id);
    if (!item) return;
    const titleEl = el.querySelector(".item-title-text");
    const subEl   = el.querySelector(".item-sub");
    const editBtn = el.querySelector(".edit-btn");
    const subVal  = col === "music_downloads" ? (item.artist || "") : (item.subtitle || "");
    titleEl.innerHTML = `<input class="edit-input" value="${esc(item.title)}" />`;
    subEl.innerHTML   = `<input class="edit-input edit-input-sub" value="${esc(subVal)}" />`;
    editBtn.title     = "Sauvegarder";
    editBtn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>`;
    editBtn.onclick   = () => saveItem(id, col, tabId, el);
    el.querySelector(".edit-input").focus();
  };

  window.saveItem = async (id, col, tabId, el) => {
    const inputs = el.querySelectorAll(".edit-input");
    const title  = inputs[0].value.trim();
    const sub    = inputs[1].value.trim();
    if (!title) { showToast("Le titre ne peut pas être vide", "error"); return; }
    try {
      if (col === "music_downloads") {
        await updateDoc(doc(db, col, id), { title, artist: sub });
        const item = musicItems.find(t => t.id === id);
        if (item) { item.title = title; item.artist = sub; }
        renderMusic();
      } else {
        await updateDoc(doc(db, col, id), { title, subtitle: sub });
        const item = genericData[tabId]?.items.find(t => t.id === id);
        if (item) { item.title = title; item.subtitle = sub; }
        renderGeneric(tabId);
      }
      showToast("Modifié ✓", "success");
    } catch (e) { showToast("Erreur : " + e.message, "error"); }
  };

  window.deleteItem = async (id, col, tabId) => {
    try {
      await deleteDoc(doc(db, col, id));
      if (col === "music_downloads") {
        musicItems = musicItems.filter(t => t.id !== id);
        updateMusicStats();
        renderMusic();
      } else {
        if (genericData[tabId]) {
          genericData[tabId].items = genericData[tabId].items.filter(t => t.id !== id);
        }
        renderGeneric(tabId);
      }
      showToast("Supprimé");
    } catch (e) { showToast("Erreur : " + e.message, "error"); }
  };

  // ── NOTES CRUD ──────────────────────────────────────────────────────
  async function loadNotes() {
    try {
      const q = query(collection(db, "brain_items"), where("category", "==", "notes"));
      const snap = await getDocs(q);
      notesItems = snap.docs
        .map(d => ({ id: d.id, ...d.data() }))
        .sort((a, b) => {
          const ta = a.createdAt?.toDate?.() || new Date(a.createdAt || 0);
          const tb = b.createdAt?.toDate?.() || new Date(b.createdAt || 0);
          return tb - ta;
        });
      notesLoaded = true;
      renderNotes();
    } catch (e) { showToast("Erreur Firebase : " + e.message, "error"); }
  }

  function renderNotes() {
    const list  = $("list-notes");
    const empty = $("empty-notes");
    list.querySelectorAll(".note-card").forEach(el => el.remove());
    empty.style.display = notesItems.length === 0 ? "block" : "none";
    notesItems.forEach(note => {
      const el = document.createElement("div");
      el.className = "note-card" + (note.done ? " archived" : "");
      el.dataset.id = note.id;
      const preview = (note.content || "").slice(0, 80).replace(/\n/g, " ");
      el.innerHTML = `
        <div class="note-card-header">
          <div class="note-card-title">${esc(note.title || "Sans titre")}</div>
          <div class="note-date">${formatDate(note.createdAt)}</div>
          <div class="note-actions">
            ${note.imageThumb ? `<button class="img-thumb-btn" title="Voir la capture" onclick="viewImage('${note.id}','brain_items','notes')">📷</button>` : ""}
            <button class="icon-btn edit-btn" title="Modifier" onclick="editNote('${note.id}')">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button class="icon-btn ${note.done ? "done" : ""}" title="${note.done ? "Désarchiver" : "Archiver"}" onclick="toggleNoteDone('${note.id}')">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
            </button>
            <button class="icon-btn del" title="Supprimer" onclick="deleteNote('${note.id}')">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
        </div>
        ${preview ? `<div class="note-preview">${esc(preview)}${note.content?.length > 80 ? "…" : ""}</div>` : ""}
        <div class="note-content" id="note-content-${note.id}">${esc(note.content || "")}</div>`;
      el.querySelector(".note-card-header").addEventListener("click", e => {
        if (e.target.closest("button")) return;
        const contentEl = $(`note-content-${note.id}`);
        contentEl.classList.toggle("expanded");
        el.querySelector(".note-preview") && (el.querySelector(".note-preview").style.display =
          contentEl.classList.contains("expanded") ? "none" : "");
      });
      list.appendChild(el);
    });
  }

  async function saveNewNote(title, content, source = "manual", imageThumb = null) {
    const data = { category: "notes", title: title || "Sans titre", content: content || "",
      done: false, createdAt: new Date(), source, ...(imageThumb ? { imageThumb } : {}) };
    try {
      const ref = await addDoc(collection(db, "brain_items"), data);
      notesItems.unshift({ id: ref.id, ...data });
      renderNotes();
      showToast("Note sauvegardée", "success");
    } catch (e) { showToast("Erreur Firebase : " + e.message, "error"); }
  }

  window.editNote = (id) => {
    const note = notesItems.find(n => n.id === id);
    if (!note) return;
    $("noteTitle").value   = note.title || "";
    $("noteContent").value = note.content || "";
    $("noteNewForm").classList.add("visible");
    $("btnSaveNote").dataset.editId = id;
    $("noteTitle").focus();
    $("panel-notes").scrollTo({ top: 0, behavior: "smooth" });
  };

  window.toggleNoteDone = async (id) => {
    const note = notesItems.find(n => n.id === id);
    if (!note) return;
    try {
      await updateDoc(doc(db, "brain_items", id), { done: !note.done });
      note.done = !note.done;
      renderNotes();
    } catch (e) { showToast("Erreur : " + e.message, "error"); }
  };

  window.deleteNote = async (id) => {
    try {
      await deleteDoc(doc(db, "brain_items", id));
      notesItems = notesItems.filter(n => n.id !== id);
      renderNotes();
      showToast("Note supprimée");
    } catch (e) { showToast("Erreur : " + e.message, "error"); }
  };

  $("btnNewNote").addEventListener("click", () => {
    $("noteNewForm").classList.toggle("visible");
    delete $("btnSaveNote").dataset.editId;
    $("noteTitle").value = "";
    $("noteContent").value = "";
    $("noteTitle").focus();
  });

  $("btnCancelNote").addEventListener("click", () => {
    $("noteNewForm").classList.remove("visible");
    delete $("btnSaveNote").dataset.editId;
  });

  $("btnSaveNote").addEventListener("click", async () => {
    const title   = $("noteTitle").value.trim();
    const content = $("noteContent").value.trim();
    if (!content && !title) { showToast("La note est vide", "error"); return; }
    const editId = $("btnSaveNote").dataset.editId;
    if (editId) {
      try {
        await updateDoc(doc(db, "brain_items", editId), { title: title || "Sans titre", content });
        const note = notesItems.find(n => n.id === editId);
        if (note) { note.title = title || "Sans titre"; note.content = content; }
        renderNotes();
        showToast("Note modifiée ✓", "success");
      } catch (e) { showToast("Erreur : " + e.message, "error"); }
    } else {
      await saveNewNote(title, content);
    }
    $("noteNewForm").classList.remove("visible");
    delete $("btnSaveNote").dataset.editId;
    $("noteTitle").value = "";
    $("noteContent").value = "";
  });

  // ── IMAGE VIEWER ────────────────────────────────────────────────────
  window.viewImage = (id, col, tabId) => {
    let item;
    if (col === "music_downloads") item = musicItems.find(t => t.id === id);
    else item = genericData[tabId]?.items.find(t => t.id === id);
    if (!item?.imageThumb) return;
    modalItemRef = { id, col, tabId };
    $("imgModalSrc").src = `data:image/jpeg;base64,${item.imageThumb}`;
    $("imgModal").classList.add("open");
  };

  function closeImgModal() {
    $("imgModal").classList.remove("open");
    $("imgModalSrc").src = "";
    modalItemRef = null;
  }

  $("imgModalBg").addEventListener("click", closeImgModal);
  $("btnCloseModal").addEventListener("click", closeImgModal);

  $("btnDeleteImg").addEventListener("click", async () => {
    if (!modalItemRef) return;
    const { id, col, tabId } = modalItemRef;
    try {
      await updateDoc(doc(db, col, id), { imageThumb: null });
      if (col === "music_downloads") {
        const item = musicItems.find(t => t.id === id);
        if (item) delete item.imageThumb;
        renderMusic();
      } else {
        const item = genericData[tabId]?.items.find(t => t.id === id);
        if (item) delete item.imageThumb;
        renderGeneric(tabId);
      }
      closeImgModal();
      showToast("Capture supprimée", "success");
    } catch (e) { showToast("Erreur : " + e.message, "error"); }
  });

  // ── MANUAL ADD ──────────────────────────────────────────────────────
  async function handleManualAdd(tabId) {
    const title = $(`manual-title-${tabId}`)?.value.trim();
    const sub   = $(`manual-sub-${tabId}`)?.value.trim() || "";
    if (!title) { showToast("Entre un titre", "error"); return; }
    if (tabId === "music") {
      await addMusic(title, sub, "manual");
    } else {
      await addGeneric(tabId, title, sub, "", "manual");
    }
    $(`manual-title-${tabId}`).value = "";
    $(`manual-sub-${tabId}`).value   = "";
  }

  // music filter
  $("musicFilterRow").querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      $("musicFilterRow").querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      musicFilter = btn.dataset.filter;
      renderMusic();
    });
  });

  // music manual add
  document.querySelector("[data-add='music']").addEventListener("click", () => handleManualAdd("music"));
  $("manual-title-music").addEventListener("keydown", e => { if (e.key === "Enter") handleManualAdd("music"); });

  // ── IMAGE QUEUE ─────────────────────────────────────────────────────
  function loadQueueImage(index) {
    const file = imageQueue[index];
    if (!file) return;
    currentImgType = file.type || "image/jpeg";
    const reader = new FileReader();
    reader.onload = ev => {
      const b64 = ev.target.result;
      currentImgB64 = b64.split(",")[1];
      $("previewImg").src = b64;
      $("previewCard").classList.add("visible");
      $("analysisResult").classList.remove("visible");
      $("actionsRow").style.display = "none";
      $("btnAnalyzeText").textContent = "Analyser avec Claude Vision";
      $("catSelector").style.display = "none";
      pendingScan = null;
      const badge = $("queueBadge");
      if (imageQueue.length > 1) {
        badge.style.display = "block";
        badge.textContent = `Image ${index + 1} / ${imageQueue.length}`;
      } else {
        badge.style.display = "none";
      }
    };
    reader.readAsDataURL(file);
  }

  function resetPreview() {
    $("previewCard").classList.remove("visible");
    $("fileInput").value = "";
    imageQueue  = [];
    queueIndex  = 0;
    currentImgB64 = null;
    pendingScan   = null;
    $("queueBadge").style.display = "none";
  }

  $("fileInput").addEventListener("change", e => {
    const files = Array.from(e.target.files);
    if (!files.length) return;
    imageQueue = files;
    queueIndex = 0;
    switchTab("scan");
    loadQueueImage(0);
  });

  const uploadZone = $("uploadZone");
  uploadZone.addEventListener("dragover", e => { e.preventDefault(); uploadZone.classList.add("drag-over"); });
  uploadZone.addEventListener("dragleave", () => uploadZone.classList.remove("drag-over"));
  uploadZone.addEventListener("drop", e => {
    e.preventDefault();
    uploadZone.classList.remove("drag-over");
    const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith("image/"));
    if (!files.length) return;
    imageQueue = files;
    queueIndex = 0;
    loadQueueImage(0);
  });

  // ── CLAUDE VISION ───────────────────────────────────────────────────
  const PROMPT = `Analyse cette image et identifie son contenu. Détermine la catégorie et extrais les informations pertinentes.

Catégories possibles :
- music : chanson YouTube, Shazam, playlist musicale, album
- watchlist : film à voir (Netflix, Disney+, Prime, cinéma…)
- series : série TV à voir
- recette : plat, recette de cuisine, food
- bricolage : projet DIY, outil, menuiserie, construction
- resine : résine époxy, pigments, coulée, moule
- deco : décoration intérieure, mobilier, design d'espace
- ia : outil IA, modèle, article sur l'intelligence artificielle
- concert : concert, festival, spectacle, billet de show
- instagram : post Instagram, compte creator, contenu social
- activite : sport, loisir, sortie, événement, activité physique
- cadeaux : idée cadeau, liste de souhaits, produit à offrir
- travail : tâche pro, projet, réunion, idée business
- blagues : blague, humour, mème, citation drôle
- pensees : pensée, citation inspirante, réflexion personnelle, philosophie
- notes : texte manuscrit, capture d'idée, note, mémo, whiteboard, tout contenu à mémoriser

Réponds UNIQUEMENT en JSON valide sans backticks :
{"category":"music","items":[{"title":"Titre","subtitle":"Info secondaire","note":""}],"note":""}

Règles :
- Pour music : subtitle = artiste. Liste TOUS les morceaux visibles dans l'image.
- Pour watchlist : subtitle = plateforme si visible, précise "série" ou "film" dans note.
- Pour concert : subtitle = lieu et date si visible.
- Pour instagram : subtitle = @compte si visible.
- Pour notes : title = résumé court, subtitle = texte complet extrait ou transcrit depuis l'image.
- Pour les autres : subtitle = info pertinente (technique, style, source…).
- Si rien de reconnaissable : {"category":"unknown","items":[],"note":"Contenu non reconnu"}`;

  $("btnAnalyze").addEventListener("click", async () => {
    const apiKey = $("apiKey").value.trim();
    if (!apiKey)       { showToast("Entre ta clé API Anthropic", "error"); return; }
    if (!currentImgB64){ showToast("Aucune image chargée", "error"); return; }

    setLoading(true, "Claude analyse l'image…");
    $("btnAnalyze").disabled = true;

    try {
      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({
          model: "claude-haiku-4-5-20251001",
          max_tokens: 1000,
          messages: [{ role: "user", content: [
            { type: "image", source: { type: "base64", media_type: "image/jpeg", data: await resizeImage(currentImgB64, currentImgType, 900) } },
            { type: "text", text: PROMPT }
          ]}]
        })
      });

      const data    = await resp.json();
      const rawText = data.content?.[0]?.text || "";
      let parsed;
      try {
        parsed = JSON.parse(rawText.replace(/```json|```/g, "").trim());
      } catch {
        throw new Error("Réponse Claude invalide : " + rawText);
      }

      if (!parsed.items?.length || parsed.category === "unknown") {
        showToast("Contenu non reconnu dans l'image", "error");
        setLoading(false);
        $("btnAnalyze").disabled = false;
        return;
      }

      pendingScan = parsed;
      renderScanResult(parsed);

    } catch (e) {
      showToast("Erreur : " + e.message, "error");
    } finally {
      setLoading(false);
      $("btnAnalyze").disabled = false;
    }
  });

  function catLabel(cat) {
    const tab = TABS.find(t => t.claudeCat === cat);
    return tab ? `${tab.icon} ${tab.label}` : cat;
  }

  function updateSaveBtn() {
    const cat = pendingScan?.category;
    const tab = TABS.find(t => t.claudeCat === cat);
    const count = pendingScan?.items?.length || 0;
    $("btnSave").textContent = count > 1
      ? `Ajouter à ${tab?.label || cat} (${count})`
      : `Ajouter à ${tab?.label || cat}`;
  }

  function renderScanResult(parsed) {
    const { category, items, note } = parsed;

    // Sélecteur de catégorie modifiable
    const sel = $("catSelect");
    sel.innerHTML = TABS.filter(t => t.id !== "scan").map(t =>
      `<option value="${t.claudeCat}" ${t.claudeCat === category ? "selected" : ""}>${t.icon} ${t.label}</option>`
    ).join("");
    $("catSelector").style.display = "flex";
    sel.onchange = () => {
      pendingScan.category = sel.value;
      updateSaveBtn();
    };

    const container = $("scanItemsContainer");
    if (items.length === 1) {
      container.innerHTML = `
        <div style="font-family:var(--font-head);font-size:15px;font-weight:600;margin-bottom:2px">${esc(items[0].title)}</div>
        ${items[0].subtitle ? `<div style="font-size:12px;color:var(--accent);margin-bottom:4px">${esc(items[0].subtitle)}</div>` : ""}
        ${items[0].note     ? `<div style="font-size:11px;color:var(--text3)">${esc(items[0].note)}</div>` : ""}`;
    } else {
      container.innerHTML = `<div class="scan-items">${items.map((it, i) => `
        <label class="scan-item">
          <input type="checkbox" class="scan-cb" data-i="${i}" checked />
          <div>
            <div class="scan-item-title">${esc(it.title)}</div>
            ${it.subtitle ? `<div class="scan-item-sub">${esc(it.subtitle)}</div>` : ""}
          </div>
        </label>`).join("")}</div>`;
    }

    $("resultNote").textContent = note || "";
    $("analysisResult").classList.add("visible");
    updateSaveBtn();
    $("actionsRow").style.display = "flex";
    $("btnAnalyzeText").textContent = "Réanalyser";
  }

  // ── SAVE FROM SCAN ──────────────────────────────────────────────────
  // keepImage toggle
  $("btnKeepImg").addEventListener("click", () => {
    keepImage = !keepImage;
    $("btnKeepImg").classList.toggle("active", keepImage);
    $("btnKeepImg").title = keepImage ? "Capture conservée avec l'élément" : "Conserver la capture avec l'élément";
  });

  $("btnSave").addEventListener("click", async () => {
    if (!pendingScan) return;
    const { category, items } = pendingScan;
    const checkboxes = document.querySelectorAll(".scan-cb");
    const toSave = checkboxes.length
      ? items.filter((_, i) => checkboxes[i]?.checked)
      : items;

    const tab = TABS.find(t => t.claudeCat === category);
    if (!tab) { showToast("Catégorie inconnue", "error"); return; }

    let imageThumb = null;
    if (keepImage && currentImgB64) {
      setLoading(true, "Compression de la capture…");
      imageThumb = await resizeImage(currentImgB64, currentImgType);
      setLoading(false);
    }

    for (const it of toSave) {
      if (tab.id === "music") {
        await addMusic(it.title, it.subtitle, "vision", imageThumb);
      } else if (tab.isNotes) {
        await saveNewNote(it.title, it.subtitle || it.note, "vision", imageThumb);
      } else {
        await addGeneric(tab.id, it.title, it.subtitle, it.note, "vision", imageThumb);
      }
    }

    keepImage = false;
    $("btnKeepImg").classList.remove("active");

    queueIndex++;
    if (queueIndex < imageQueue.length) {
      loadQueueImage(queueIndex);
    } else {
      resetPreview();
    }

    if (tab && toSave.length === 1) {
      setTimeout(() => switchTab(tab.id), 400);
    }
  });

  $("btnCancel").addEventListener("click", () => {
    keepImage = false;
    $("btnKeepImg").classList.remove("active");
    resetPreview();
  });

  // ── SHARE TARGET (PWA) ──────────────────────────────────────────────
  async function checkSharedImages() {
    if (!location.search.includes("shared=1")) return;
    history.replaceState({}, "", location.pathname);
    try {
      const cache = await caches.open("sb-share-v1");
      const meta  = await cache.match("/sb-shared-meta");
      if (!meta) return;
      const { count } = await meta.json();
      const files = [];
      for (let i = 0; i < count; i++) {
        const r = await cache.match(`/sb-shared-${i}`);
        if (r) {
          const blob = await r.blob();
          files.push(new File([blob], `shared-${i}.jpg`, { type: blob.type || "image/jpeg" }));
        }
      }
      if (files.length) {
        imageQueue = files;
        queueIndex = 0;
        switchTab("scan");
        loadQueueImage(0);
        showToast(`${files.length} image${files.length > 1 ? "s" : ""} reçue${files.length > 1 ? "s" : ""}`, "success");
      }
      // clear cache
      const keys = await cache.keys();
      for (const k of keys) await cache.delete(k);
    } catch (e) { console.error("Share target read error:", e); }
  }

  // ── API KEY ─────────────────────────────────────────────────────────
  async function loadApiKey() {
    try {
      const snap = await getDoc(doc(db, "settings", "anthropic"));
      if (snap.exists() && snap.data().apiKey) $("apiKey").value = snap.data().apiKey;
    } catch (e) {}
  }

  $("btnSaveKey").addEventListener("click", async () => {
    const key = $("apiKey").value.trim();
    if (!key) { showToast("Entre une clé à sauvegarder", "error"); return; }
    try {
      await setDoc(doc(db, "settings", "anthropic"), { apiKey: key });
      showToast("Clé sauvegardée ✓", "success");
    } catch (e) { showToast("Erreur : " + e.message, "error"); }
  });

  // ── SERVICE WORKER ──────────────────────────────────────────────────
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/second-brain/sw.js", { scope: "/second-brain/" })
      .catch(e => console.warn("SW registration failed:", e));
  }

  // ── INIT ────────────────────────────────────────────────────────────
  buildNav();
  buildGenericPanels();
  await loadApiKey();
  await checkSharedImages();
  loadMusic();
</script>
