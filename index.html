<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Second Brain — Musique</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0f;
    --bg2: #161618;
    --bg3: #1e1e21;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0ede8;
    --text2: #9c9890;
    --text3: #5c5a57;
    --accent: #e8c97a;
    --accent2: #c4a558;
    --accent-bg: rgba(232,201,122,0.08);
    --danger: #e06060;
    --success: #6abf8a;
    --radius: 10px;
    --font-head: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  .app {
    max-width: 680px;
    margin: 0 auto;
    padding: 24px 16px 80px;
  }

  header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 0.5px solid var(--border);
  }

  .logo {
    width: 36px;
    height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .logo svg { width: 18px; height: 18px; }

  header h1 {
    font-family: var(--font-head);
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  header span {
    font-size: 12px;
    color: var(--text3);
    font-weight: 300;
    display: block;
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 24px;
  }

  .stat {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
  }

  .stat-val {
    font-family: var(--font-head);
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-label {
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .upload-zone {
    background: var(--bg2);
    border: 1.5px dashed var(--border2);
    border-radius: var(--radius);
    padding: 32px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }

  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    background: var(--accent-bg);
  }

  .upload-zone input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }

  .upload-icon {
    width: 44px; height: 44px;
    background: var(--bg3);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 12px;
  }

  .upload-icon svg { width: 20px; height: 20px; color: var(--accent); }

  .upload-zone p {
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 4px;
  }

  .upload-zone small {
    font-size: 11px;
    color: var(--text3);
  }

  .api-section {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 24px;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .api-section label {
    font-size: 11px;
    color: var(--text3);
    white-space: nowrap;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .api-section input {
    flex: 1;
    background: var(--bg3);
    border: 0.5px solid var(--border);
    border-radius: 6px;
    padding: 7px 10px;
    color: var(--text2);
    font-family: var(--font-mono);
    font-size: 12px;
    outline: none;
  }

  .api-section input:focus { border-color: var(--accent); }

  .preview-card {
    background: var(--bg2);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
    display: none;
  }

  .preview-card.visible { display: block; }

  .preview-img {
    width: 100%;
    max-height: 200px;
    object-fit: cover;
    border-radius: 6px;
    margin-bottom: 12px;
  }

  .analysis-result {
    background: var(--bg3);
    border: 0.5px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    margin-bottom: 12px;
    display: none;
  }

  .analysis-result.visible { display: block; }

  .result-track {
    font-family: var(--font-head);
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 2px;
  }

  .result-artist {
    font-size: 12px;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .result-note {
    font-size: 11px;
    color: var(--text3);
    font-style: italic;
  }

  .track-list { display: flex; flex-direction: column; gap: 5px; margin-bottom: 6px; }
  .track-item {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 9px; background: var(--bg2);
    border-radius: 5px; cursor: pointer;
  }
  .track-item input[type=checkbox] { accent-color: var(--accent); flex-shrink: 0; width: 15px; height: 15px; }
  .track-item-title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .track-item-artist { font-size: 11px; color: var(--accent); }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 16px;
    border-radius: 7px;
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: opacity 0.15s, transform 0.1s;
  }

  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-primary {
    background: var(--accent);
    color: #1a1500;
    width: 100%;
    justify-content: center;
    font-size: 13px;
    padding: 11px;
  }

  .btn-primary:hover:not(:disabled) { background: var(--accent2); }

  .btn-ghost {
    background: var(--bg3);
    color: var(--text2);
    border: 0.5px solid var(--border);
  }

  .btn-ghost:hover { border-color: var(--border2); color: var(--text); }

  .btn-success {
    background: rgba(106, 191, 138, 0.12);
    color: var(--success);
    border: 0.5px solid rgba(106, 191, 138, 0.25);
  }

  .btn-danger {
    background: rgba(224, 96, 96, 0.1);
    color: var(--danger);
    border: 0.5px solid rgba(224, 96, 96, 0.2);
  }

  .actions-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(26,21,0,0.3);
    border-top-color: #1a1500;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .section-title {
    font-family: var(--font-head);
    font-size: 13px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 0.5px;
    background: var(--border);
  }

  .filter-row {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 5px 12px;
    border-radius: 20px;
    font-family: var(--font-mono);
    font-size: 11px;
    cursor: pointer;
    border: 0.5px solid var(--border);
    background: transparent;
    color: var(--text3);
    transition: all 0.15s;
  }

  .filter-btn:hover, .filter-btn.active {
    background: var(--accent-bg);
    border-color: var(--accent);
    color: var(--accent);
  }

  .track-list { display: flex; flex-direction: column; gap: 6px; }

  .edit-input {
    background: var(--bg3); border: 0.5px solid var(--accent);
    border-radius: 4px; color: var(--text1); padding: 2px 6px;
    font-family: inherit; font-size: inherit; width: 100%;
    outline: none;
  }
  .edit-input-artist { font-size: 11px; color: var(--accent); margin-top: 2px; }
  .queue-badge {
    font-size: 11px; color: var(--text3); text-align: center;
    padding: 4px 0 0; font-family: var(--font-mono);
  }

  .track-item {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: border-color 0.15s;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .track-item:hover { border-color: var(--border2); }

  .track-item.downloaded {
    opacity: 0.5;
    border-style: dashed;
  }

  .track-num {
    font-size: 11px;
    color: var(--text3);
    min-width: 20px;
    text-align: right;
    font-weight: 300;
  }

  .track-info { flex: 1; min-width: 0; }

  .track-name {
    font-family: var(--font-head);
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .track-item.downloaded .track-name {
    text-decoration: line-through;
    color: var(--text3);
  }

  .track-artist {
    font-size: 11px;
    color: var(--text3);
    margin-top: 1px;
  }

  .track-date {
    font-size: 10px;
    color: var(--text3);
    white-space: nowrap;
    font-weight: 300;
  }

  .track-actions { display: flex; gap: 5px; }

  .icon-btn {
    width: 28px; height: 28px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    border: 0.5px solid var(--border);
    background: transparent;
    color: var(--text3);
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .icon-btn:hover { border-color: var(--border2); color: var(--text); }
  .icon-btn.done { color: var(--success); border-color: rgba(106,191,138,0.3); background: rgba(106,191,138,0.08); }
  .icon-btn.del:hover { color: var(--danger); border-color: rgba(224,96,96,0.3); background: rgba(224,96,96,0.08); }

  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--text3);
    font-size: 13px;
  }

  .empty-state svg { width: 40px; height: 40px; margin: 0 auto 12px; display: block; opacity: 0.3; }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--bg3);
    border: 0.5px solid var(--border2);
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 13px;
    color: var(--text);
    transition: transform 0.3s ease;
    z-index: 999;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: rgba(106,191,138,0.4); color: var(--success); }
  .toast.error { border-color: rgba(224,96,96,0.4); color: var(--danger); }

  .loading-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(14,14,15,0.8);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }

  .loading-overlay.visible { display: flex; }

  .loading-ring {
    width: 48px; height: 48px;
    border: 3px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  .loading-text { font-size: 13px; color: var(--text2); }

  .manual-add {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 24px;
  }

  .manual-row { display: flex; gap: 8px; }

  .manual-row input {
    flex: 1;
    background: var(--bg3);
    border: 0.5px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    outline: none;
  }

  .manual-row input:focus { border-color: var(--accent); }
  .manual-row input::placeholder { color: var(--text3); }

  .tag {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    background: var(--accent-bg);
    color: var(--accent2);
    border: 0.5px solid rgba(232,201,122,0.2);
    margin-left: 6px;
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-ring"></div>
  <div class="loading-text" id="loadingText">Analyse en cours…</div>
</div>

<div class="toast" id="toast"></div>

<div class="app">

  <header>
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="#1a1500" stroke-width="2.5" stroke-linecap="round">
        <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
      </svg>
    </div>
    <div>
      <h1>Second Brain — Musique</h1>
      <span>Liste de téléchargement</span>
    </div>
  </header>

  <div class="stats">
    <div class="stat">
      <div class="stat-val" id="statTotal">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="statPending">0</div>
      <div class="stat-label">À télécharger</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="statDone">0</div>
      <div class="stat-label">Téléchargés</div>
    </div>
  </div>

  <div class="api-section">
    <label>Clé API</label>
    <input type="password" id="apiKey" placeholder="sk-ant-…" />
    <button class="btn btn-ghost" id="btnSaveKey" style="white-space:nowrap;padding:7px 12px;font-size:11px">Sauvegarder</button>
  </div>

  <div class="upload-zone" id="uploadZone">
    <input type="file" id="fileInput" accept="image/*" multiple />
    <div class="upload-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
    </div>
    <p>Dépose tes screenshots ici</p>
    <small>ou clique pour choisir une ou plusieurs images</small>
  </div>

  <div class="preview-card" id="previewCard">
    <div class="queue-badge" id="queueBadge" style="display:none"></div>
    <img id="previewImg" class="preview-img" />
    <div class="analysis-result" id="analysisResult">
      <div id="trackListContainer"></div>
      <div class="result-note" id="resultNote"></div>
    </div>
    <button class="btn btn-primary" id="btnAnalyze">
      <div class="spinner" id="spinner"></div>
      <span id="btnAnalyzeText">Analyser avec Claude Vision</span>
    </button>
    <div class="actions-row" id="actionsRow" style="display:none">
      <button class="btn btn-success" id="btnSave" style="flex:1">Ajouter à la liste</button>
      <button class="btn btn-ghost" id="btnCancel">Annuler</button>
    </div>
  </div>

  <div class="manual-add">
    <div class="manual-row">
      <input type="text" id="manualTitle" placeholder="Titre" />
      <input type="text" id="manualArtist" placeholder="Artiste (optionnel)" style="max-width:180px" />
      <button class="btn btn-ghost" id="btnManual" style="white-space:nowrap">+ Ajouter</button>
    </div>
  </div>

  <div class="section-title">Liste</div>

  <div class="filter-row">
    <button class="filter-btn active" data-filter="all">Tout</button>
    <button class="filter-btn" data-filter="pending">À télécharger</button>
    <button class="filter-btn" data-filter="done">Téléchargés</button>
  </div>

  <div class="track-list" id="trackList">
    <div class="empty-state" id="emptyState">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
      </svg>
      Aucune chanson pour l'instant.<br>Envoie un screenshot pour commencer.
    </div>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, orderBy, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAGQhsIG0EaLZffLe2FvxQJWWjVJypkywE",
    authDomain: "second-brain-91664.firebaseapp.com",
    projectId: "second-brain-91664",
    storageBucket: "second-brain-91664.firebasestorage.app",
    messagingSenderId: "910954096501",
    appId: "1:910954096501:web:d30d7b47a0c1bb56bf953c"
  };

  const fbApp = initializeApp(firebaseConfig);
  const db = getFirestore(fbApp);
  const COL = "music_downloads";

  let tracks = [];
  let currentFilter = "all";
  let pendingTracks = null;
  let currentImageBase64 = null;
  let imageQueue = [];
  let queueIndex = 0;

  const $ = id => document.getElementById(id);

  function showToast(msg, type = "") {
    const t = $("toast");
    t.textContent = msg;
    t.className = "toast show " + type;
    setTimeout(() => t.className = "toast", 2800);
  }

  function setLoading(visible, text = "Analyse en cours…") {
    $("loadingOverlay").classList.toggle("visible", visible);
    $("loadingText").textContent = text;
  }

  function formatDate(ts) {
    if (!ts) return "";
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString("fr-FR", { day: "2-digit", month: "2-digit" });
  }

  function updateStats() {
    const total = tracks.length;
    const done = tracks.filter(t => t.downloaded).length;
    $("statTotal").textContent = total;
    $("statPending").textContent = total - done;
    $("statDone").textContent = done;
  }

  function renderTracks() {
    const list = $("trackList");
    const empty = $("emptyState");
    const filtered = tracks.filter(t => {
      if (currentFilter === "pending") return !t.downloaded;
      if (currentFilter === "done") return t.downloaded;
      return true;
    });

    if (filtered.length === 0) {
      empty.style.display = "block";
      const items = list.querySelectorAll(".track-item");
      items.forEach(i => i.remove());
      return;
    }

    empty.style.display = "none";
    list.querySelectorAll(".track-item").forEach(i => i.remove());

    filtered.forEach((track, idx) => {
      const el = document.createElement("div");
      el.className = "track-item" + (track.downloaded ? " downloaded" : "");
      el.dataset.id = track.id;
      el.innerHTML = `
        <div class="track-num">${idx + 1}</div>
        <div class="track-info">
          <div class="track-name"><span class="track-name-text">${track.title}</span>${track.source === "vision" ? '<span class="tag">IA</span>' : ""}</div>
          <div class="track-artist">${track.artist || "—"}</div>
        </div>
        <div class="track-date">${formatDate(track.createdAt)}</div>
        <div class="track-actions">
          <button class="icon-btn edit-btn" title="Modifier" onclick="editTrack('${track.id}')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="icon-btn ${track.downloaded ? "done" : ""}" title="${track.downloaded ? "Marquer non téléchargé" : "Marquer téléchargé"}" onclick="toggleDone('${track.id}')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
          </button>
          <button class="icon-btn del" title="Supprimer" onclick="deleteTrack('${track.id}')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>`;
      list.appendChild(el);
    });
  }

  async function loadTracks() {
    try {
      const q = query(collection(db, COL), orderBy("createdAt", "desc"));
      const snap = await getDocs(q);
      tracks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      updateStats();
      renderTracks();
    } catch (e) {
      showToast("Erreur Firebase : " + e.message, "error");
    }
  }

  window.toggleDone = async (id) => {
    const track = tracks.find(t => t.id === id);
    if (!track) return;
    try {
      await updateDoc(doc(db, COL, id), { downloaded: !track.downloaded });
      track.downloaded = !track.downloaded;
      updateStats();
      renderTracks();
      showToast(track.downloaded ? "Marqué téléchargé ✓" : "Remis en liste", track.downloaded ? "success" : "");
    } catch (e) { showToast("Erreur : " + e.message, "error"); }
  };

  window.deleteTrack = async (id) => {
    try {
      await deleteDoc(doc(db, COL, id));
      tracks = tracks.filter(t => t.id !== id);
      updateStats();
      renderTracks();
      showToast("Supprimé");
    } catch (e) { showToast("Erreur : " + e.message, "error"); }
  };

  window.editTrack = (id) => {
    const el = document.querySelector(`.track-item[data-id="${id}"]`);
    if (!el) return;
    const track = tracks.find(t => t.id === id);
    if (!track) return;
    const nameEl = el.querySelector(".track-name-text");
    const artistEl = el.querySelector(".track-artist");
    const editBtn = el.querySelector(".edit-btn");
    nameEl.innerHTML = `<input class="edit-input" value="${track.title.replace(/"/g, '&quot;')}" />`;
    artistEl.innerHTML = `<input class="edit-input edit-input-artist" value="${(track.artist || "").replace(/"/g, '&quot;')}" />`;
    editBtn.title = "Sauvegarder";
    editBtn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>`;
    editBtn.onclick = () => saveTrack(id, el);
    el.querySelector(".edit-input").focus();
  };

  window.saveTrack = async (id, el) => {
    const inputs = el.querySelectorAll(".edit-input");
    const title = inputs[0].value.trim();
    const artist = inputs[1].value.trim();
    if (!title) { showToast("Le titre ne peut pas être vide", "error"); return; }
    try {
      await updateDoc(doc(db, COL, id), { title, artist });
      const t = tracks.find(t => t.id === id);
      if (t) { t.title = title; t.artist = artist; }
      renderTracks();
      showToast("Modifié ✓", "success");
    } catch (e) { showToast("Erreur : " + e.message, "error"); }
  };

  async function addTrack(title, artist, source = "manual") {
    const data = { title, artist: artist || "", downloaded: false, createdAt: new Date(), source };
    try {
      const ref = await addDoc(collection(db, COL), data);
      tracks.unshift({ id: ref.id, ...data });
      updateStats();
      renderTracks();
      showToast("Ajouté : " + title, "success");
    } catch (e) { showToast("Erreur Firebase : " + e.message, "error"); }
  }

  function loadQueueImage(index) {
    const file = imageQueue[index];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const b64 = ev.target.result;
      currentImageBase64 = b64.split(",")[1];
      $("previewImg").src = b64;
      $("previewCard").classList.add("visible");
      $("analysisResult").classList.remove("visible");
      $("actionsRow").style.display = "none";
      $("btnAnalyzeText").textContent = "Analyser avec Claude Vision";
      pendingTracks = null;
      const badge = $("queueBadge");
      if (imageQueue.length > 1) {
        badge.style.display = "block";
        badge.textContent = `Image ${index + 1} / ${imageQueue.length}`;
      } else {
        badge.style.display = "none";
      }
    };
    reader.readAsDataURL(file);
  }

  $("fileInput").addEventListener("change", e => {
    const files = Array.from(e.target.files);
    if (!files.length) return;
    imageQueue = files;
    queueIndex = 0;
    loadQueueImage(0);
  });

  const uploadZone = $("uploadZone");
  uploadZone.addEventListener("dragover", e => { e.preventDefault(); uploadZone.classList.add("drag-over"); });
  uploadZone.addEventListener("dragleave", () => uploadZone.classList.remove("drag-over"));
  uploadZone.addEventListener("drop", e => {
    e.preventDefault();
    uploadZone.classList.remove("drag-over");
    const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith("image/"));
    if (!files.length) return;
    imageQueue = files;
    queueIndex = 0;
    loadQueueImage(0);
  });

  $("btnAnalyze").addEventListener("click", async () => {
    const apiKey = $("apiKey").value.trim();
    if (!apiKey) { showToast("Entre ta clé API Anthropic", "error"); return; }
    if (!currentImageBase64) { showToast("Aucune image chargée", "error"); return; }

    setLoading(true, "Claude analyse ton screenshot…");
    $("btnAnalyze").disabled = true;

    try {
      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{
            role: "user",
            content: [
              {
                type: "image",
                source: { type: "base64", media_type: "image/jpeg", data: currentImageBase64 }
              },
              {
                type: "text",
                text: `Analyse ce screenshot (YouTube, Shazam, liste de lecture, ou autre source musicale) et extrais TOUS les titres et artistes visibles.
Réponds UNIQUEMENT en JSON valide, sans backticks ni markdown, exactement ce format :
{"tracks":[{"title":"Titre","artist":"Artiste"}],"note":"note optionnelle"}
Si plusieurs morceaux sont visibles, liste-les tous dans le tableau tracks.
Si tu ne trouves aucune musique, réponds : {"tracks":[],"note":"Aucune musique détectée"}`
              }
            ]
          }]
        })
      });

      const data = await resp.json();
      const rawText = data.content?.[0]?.text || "";

      let parsed;
      try {
        const clean = rawText.replace(/```json|```/g, "").trim();
        parsed = JSON.parse(clean);
      } catch {
        throw new Error("Réponse Claude invalide : " + rawText);
      }

      const tracklist = parsed.tracks || [];
      if (!tracklist.length) {
        showToast("Aucune musique détectée dans l'image", "error");
        setLoading(false);
        $("btnAnalyze").disabled = false;
        return;
      }

      const container = $("trackListContainer");
      if (tracklist.length === 1) {
        container.innerHTML = `<div class="result-track">${tracklist[0].title}</div><div class="result-artist">${tracklist[0].artist || "Artiste inconnu"}</div>`;
        $("btnSave").textContent = "Ajouter à la liste";
      } else {
        container.innerHTML = `<div class="track-list">${tracklist.map((t, i) => `<label class="track-item"><input type="checkbox" class="track-cb" data-i="${i}" checked /><div class="track-item-info"><div class="track-item-title">${t.title}</div><div class="track-item-artist">${t.artist || "Artiste inconnu"}</div></div></label>`).join("")}</div>`;
        $("btnSave").textContent = `Ajouter tout (${tracklist.length})`;
      }

      pendingTracks = tracklist;
      $("resultNote").textContent = parsed.note || "";
      $("analysisResult").classList.add("visible");
      $("actionsRow").style.display = "flex";
      $("btnAnalyzeText").textContent = "Réanalyser";

    } catch (e) {
      showToast("Erreur : " + e.message, "error");
    } finally {
      setLoading(false);
      $("btnAnalyze").disabled = false;
    }
  });

  $("btnSave").addEventListener("click", async () => {
    if (!pendingTracks?.length) return;
    const checkboxes = document.querySelectorAll(".track-cb");
    const toSave = checkboxes.length
      ? pendingTracks.filter((_, i) => checkboxes[i]?.checked)
      : pendingTracks;
    for (const t of toSave) {
      await addTrack(t.title, t.artist || "", "vision");
    }
    queueIndex++;
    if (queueIndex < imageQueue.length) {
      loadQueueImage(queueIndex);
    } else {
      $("previewCard").classList.remove("visible");
      $("fileInput").value = "";
      imageQueue = [];
      queueIndex = 0;
      $("queueBadge").style.display = "none";
    }
    currentImageBase64 = null;
    pendingTracks = null;
  });

  $("btnCancel").addEventListener("click", () => {
    $("previewCard").classList.remove("visible");
    $("fileInput").value = "";
    currentImageBase64 = null;
    imageQueue = [];
    queueIndex = 0;
    $("queueBadge").style.display = "none";
    pendingTracks = null;
  });

  $("btnManual").addEventListener("click", async () => {
    const title = $("manualTitle").value.trim();
    const artist = $("manualArtist").value.trim();
    if (!title) { showToast("Entre un titre", "error"); return; }
    await addTrack(title, artist, "manual");
    $("manualTitle").value = "";
    $("manualArtist").value = "";
  });

  $("manualTitle").addEventListener("keydown", e => {
    if (e.key === "Enter") $("btnManual").click();
  });

  document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentFilter = btn.dataset.filter;
      renderTracks();
    });
  });

  async function loadApiKey() {
    try {
      const snap = await getDoc(doc(db, "settings", "anthropic"));
      if (snap.exists() && snap.data().apiKey) {
        $("apiKey").value = snap.data().apiKey;
        showToast("Clé API chargée", "success");
      }
    } catch (e) { }
  }

  $("btnSaveKey").addEventListener("click", async () => {
    const key = $("apiKey").value.trim();
    if (!key) { showToast("Entre une clé à sauvegarder", "error"); return; }
    try {
      await setDoc(doc(db, "settings", "anthropic"), { apiKey: key });
      showToast("Clé API sauvegardée ✓", "success");
    } catch (e) { showToast("Erreur : " + e.message, "error"); }
  });

  loadApiKey();
  loadTracks();
</script>
</body>
</html>
